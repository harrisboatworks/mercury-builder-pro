<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Mercury outboard maintenance schedule</title>
  <desc id="desc">A four-stage guide separating model-specific break-in, an optional dealer check, 100-hour or annual scheduled service, and expanded 300-hour service.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050E1C"/>
      <stop offset="0.62" stop-color="#0A1828"/>
      <stop offset="1" stop-color="#122039"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C9A24A" stop-opacity="0.2"/>
      <stop offset="0.5" stop-color="#C9A24A"/>
      <stop offset="1" stop-color="#C9A24A" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000814" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#background)"/>
  <circle cx="1430" cy="30" r="300" fill="#C8102E" opacity="0.08"/>
  <circle cx="170" cy="890" r="320" fill="#C9A24A" opacity="0.06"/>
  <path d="M0 758 L1600 560 L1600 900 L0 900 Z" fill="#F5F1EA" opacity="0.025"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="112" y="92" fill="#C9A24A" font-size="22" font-weight="700" letter-spacing="6">HARRIS BOAT WORKS • OWNER GUIDE</text>
    <text x="112" y="164" fill="#F5F1EA" font-size="56" font-weight="800" letter-spacing="-1.5">MERCURY OUTBOARD MAINTENANCE</text>
    <text x="112" y="211" fill="#F5F1EA" fill-opacity="0.68" font-size="26">Break-in, optional check, and scheduled service are separate timelines.</text>
    <rect x="112" y="246" width="1376" height="2" fill="url(#goldLine)"/>

    <g filter="url(#shadow)">
      <rect x="112" y="306" width="319" height="348" rx="20" fill="#F5F1EA"/>
      <rect x="464" y="306" width="319" height="348" rx="20" fill="#F5F1EA"/>
      <rect x="816" y="306" width="319" height="348" rx="20" fill="#F5F1EA"/>
      <rect x="1168" y="306" width="319" height="348" rx="20" fill="#F5F1EA"/>
    </g>

    <g>
      <rect x="112" y="306" width="319" height="10" rx="5" fill="#69A8A6"/>
      <circle cx="160" cy="363" r="24" fill="#0A1828"/>
      <text x="160" y="372" text-anchor="middle" fill="#F5F1EA" font-size="25" font-weight="800">1</text>
      <text x="200" y="357" fill="#050E1C" font-size="18" font-weight="800" letter-spacing="2">BREAK-IN</text>
      <text x="200" y="383" fill="#050E1C" fill-opacity="0.55" font-size="14" font-weight="700" letter-spacing="1.5">MODEL-SPECIFIC</text>
      <text x="144" y="452" fill="#050E1C" font-size="33" font-weight="800">First hours</text>
      <text x="144" y="497" fill="#050E1C" fill-opacity="0.68" font-size="20">Follow the exact throttle,</text>
      <text x="144" y="527" fill="#050E1C" fill-opacity="0.68" font-size="20">load and RPM procedure in</text>
      <text x="144" y="557" fill="#050E1C" fill-opacity="0.68" font-size="20">your owner's manual.</text>
      <text x="144" y="616" fill="#2A4D69" font-size="16" font-weight="700">Many current examples: 10 hours</text>
    </g>

    <g>
      <rect x="464" y="306" width="319" height="10" rx="5" fill="#C9A24A"/>
      <circle cx="512" cy="363" r="24" fill="#0A1828"/>
      <text x="512" y="372" text-anchor="middle" fill="#F5F1EA" font-size="25" font-weight="800">2</text>
      <text x="552" y="357" fill="#050E1C" font-size="18" font-weight="800" letter-spacing="1.7">OPTIONAL CHECK</text>
      <text x="552" y="383" fill="#050E1C" fill-opacity="0.55" font-size="14" font-weight="700" letter-spacing="1.5">DEALER ADVICE</text>
      <text x="496" y="452" fill="#050E1C" font-size="33" font-weight="800">A few weeks</text>
      <text x="496" y="497" fill="#050E1C" fill-opacity="0.68" font-size="20">A dealer may recommend an</text>
      <text x="496" y="527" fill="#050E1C" fill-opacity="0.68" font-size="20">early check after purchase.</text>
      <text x="496" y="580" fill="#9A0C24" font-size="17" font-weight="800">Not a universal 20-hour</text>
      <text x="496" y="606" fill="#9A0C24" font-size="17" font-weight="800">warranty service.</text>
    </g>

    <g>
      <rect x="816" y="306" width="319" height="10" rx="5" fill="#C8102E"/>
      <circle cx="864" cy="363" r="24" fill="#0A1828"/>
      <text x="864" y="372" text-anchor="middle" fill="#F5F1EA" font-size="25" font-weight="800">3</text>
      <text x="904" y="357" fill="#050E1C" font-size="18" font-weight="800" letter-spacing="1.5">SCHEDULED SERVICE</text>
      <text x="904" y="383" fill="#050E1C" fill-opacity="0.55" font-size="11.5" font-weight="700" letter-spacing="0.8">MOST CURRENT FOURSTROKES</text>
      <text x="848" y="452" fill="#050E1C" font-size="36" font-weight="800">100 hours</text>
      <text x="848" y="490" fill="#C8102E" font-size="22" font-weight="800">OR ANNUALLY</text>
      <text x="848" y="537" fill="#050E1C" fill-opacity="0.68" font-size="20">Whichever comes first.</text>
      <text x="848" y="567" fill="#050E1C" fill-opacity="0.68" font-size="20">Complete the items listed</text>
      <text x="848" y="597" fill="#050E1C" fill-opacity="0.68" font-size="20">for the exact motor.</text>
    </g>

    <g>
      <rect x="1168" y="306" width="319" height="10" rx="5" fill="#2A4D69"/>
      <circle cx="1216" cy="363" r="24" fill="#0A1828"/>
      <text x="1216" y="372" text-anchor="middle" fill="#F5F1EA" font-size="25" font-weight="800">4</text>
      <text x="1256" y="357" fill="#050E1C" font-size="18" font-weight="800" letter-spacing="1.4">EXPANDED SERVICE</text>
      <text x="1256" y="383" fill="#050E1C" fill-opacity="0.55" font-size="14" font-weight="700" letter-spacing="1.5">MODEL-SPECIFIC ITEMS</text>
      <text x="1200" y="452" fill="#050E1C" font-size="36" font-weight="800">300 hours</text>
      <text x="1200" y="490" fill="#2A4D69" font-size="22" font-weight="800">OR ~3 SEASONS</text>
      <text x="1200" y="537" fill="#050E1C" fill-opacity="0.68" font-size="20">The 100-hour work plus</text>
      <text x="1200" y="567" fill="#050E1C" fill-opacity="0.68" font-size="20">additional components that</text>
      <text x="1200" y="597" fill="#050E1C" fill-opacity="0.68" font-size="20">vary by engine model.</text>
    </g>

    <g>
      <rect x="112" y="710" width="1376" height="98" rx="18" fill="#F5F1EA" fill-opacity="0.08" stroke="#C9A24A" stroke-opacity="0.45"/>
      <circle cx="163" cy="759" r="21" fill="#C9A24A"/>
      <path d="M153 759 l7 7 14-17" fill="none" stroke="#050E1C" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="203" y="751" fill="#F5F1EA" font-size="24" font-weight="800">Your serial-number owner's manual is the final schedule.</text>
      <text x="203" y="781" fill="#F5F1EA" fill-opacity="0.64" font-size="18">Engine family, model year, use and conditions can change the exact timing and service list.</text>
      <text x="1438" y="771" text-anchor="end" fill="#C9A24A" font-size="18" font-weight="800" letter-spacing="2.5">HBW • GORES LANDING</text>
    </g>
  </g>
</svg>
