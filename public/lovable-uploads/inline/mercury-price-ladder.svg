<svg width="100%" viewBox="0 0 680 632" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Mercury outboard price ladder, cheapest models in Canada 2026</title>
<desc>Mercury outboard bare-motor dealer prices in CAD climb steeply with horsepower, from the 2.5 HP at $1,271 up to the 150 HP at $22,022. These are bare-motor prices before controls, propeller and rigging. Source mercuryrepower.ca, May 2026.</desc>
<style>
text{font-family:'Anthropic Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.h4{font-size:31px;font-weight:700;fill:#20384d}
.s4{font-size:12.5px;font-weight:400;fill:#6f7c88}
.pun{font-size:14px;font-weight:500;fill:#20384d}
.subl{font-size:12px;font-weight:400;fill:#3f5160}
.src4{font-size:11px;font-weight:400;fill:#9aa4ad}
.bar{font-size:12px;font-weight:700;fill:#20384d}
.barhp{font-size:12.5px;font-weight:700;fill:#20384d}
</style>
<rect x="0" y="0" width="680" height="632" fill="#f4efe3"/>
<rect x="36" y="36" width="608" height="560" rx="18" fill="#ffffff" stroke="#20384d" stroke-opacity="0.10" stroke-width="1"/>
<image x="520" y="50" width="88" height="62" href="data:image/png;base64,"/>
<text class="h4" x="72" y="96">How cheap is a <tspan fill="#c8102e">Mercury?</tspan></text>
<text class="s4" x="73" y="121">Bare-motor dealer prices climb fast with horsepower, CAD</text>
<line x1="72" y1="141" x2="608" y2="141" stroke="#20384d" stroke-opacity="0.12" stroke-width="1"/>
<text class="barhp" x="140" y="193" text-anchor="end">2.5 HP</text>
<rect x="152" y="178" width="19" height="22" rx="4" fill="#c8102e"/>
<text class="bar" x="180" y="193">$1,271</text>
<text class="barhp" x="140" y="237" text-anchor="end">9.9 HP</text>
<rect x="152" y="222" width="44" height="22" rx="4" fill="#20384d"/>
<text class="bar" x="205" y="237">$2,999</text>
<text class="barhp" x="140" y="281" text-anchor="end">25 HP</text>
<rect x="152" y="266" width="73" height="22" rx="4" fill="#20384d"/>
<text class="bar" x="234" y="281">$4,967</text>
<text class="barhp" x="140" y="325" text-anchor="end">40 HP</text>
<rect x="152" y="310" width="139" height="22" rx="4" fill="#20384d"/>
<text class="bar" x="300" y="325">$9,532</text>
<text class="barhp" x="140" y="369" text-anchor="end">60 HP</text>
<rect x="152" y="354" width="178" height="22" rx="4" fill="#20384d"/>
<text class="bar" x="339" y="369">$12,161</text>
<text class="barhp" x="140" y="413" text-anchor="end">90 HP</text>
<rect x="152" y="398" width="217" height="22" rx="4" fill="#20384d"/>
<text class="bar" x="378" y="413">$14,812</text>
<text class="barhp" x="140" y="457" text-anchor="end">115 HP</text>
<rect x="152" y="442" width="247" height="22" rx="4" fill="#20384d"/>
<text class="bar" x="408" y="457">$16,913</text>
<text class="barhp" x="140" y="501" text-anchor="end">150 HP</text>
<rect x="152" y="486" width="322" height="22" rx="4" fill="#20384d"/>
<text class="bar" x="483" y="501">$22,022</text>
<line x1="72" y1="514" x2="608" y2="514" stroke="#20384d" stroke-opacity="0.12" stroke-width="1"/>
<text class="pun" x="340" y="536" text-anchor="middle">The cheapest Mercury is the <tspan fill="#c8102e">2.5 HP at $1,271</tspan>.</text>
<text class="subl" x="340" y="558" text-anchor="middle">Bare-motor dealer price. Add controls, propeller, and rigging for a fully rigged total.</text>
<text class="src4" x="72" y="582">Dealer prices, mercuryrepower.ca/pricing-reference, May 2026. Verified weekly.</text>
