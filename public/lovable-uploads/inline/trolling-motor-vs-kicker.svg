<svg width="100%" viewBox="0 0 680 556" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Electric trolling motor versus gas kicker for Rice Lake</title>
<desc>A comparison of an electric trolling motor and a gas kicker motor for Rice Lake and the Kawarthas. The electric trolling motor suits shallow water, bass, stealth and solo fishing; the gas kicker suits walleye trolling, big water, all-day range and backup propulsion. Most serious anglers run both. Source mercuryrepower.ca.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.h4{font-size:31px;font-weight:700;fill:#20384d}
.s4{font-size:12.5px;font-weight:400;fill:#6f7c88}
.pun{font-size:14px;font-weight:500;fill:#20384d}
.subl{font-size:12px;font-weight:400;fill:#3f5160}
.src4{font-size:11px;font-weight:400;fill:#9aa4ad}
.hp{font-size:22px;font-weight:700;fill:#ffffff}
.phh{font-size:11px;font-weight:400;fill:#ffffff}
.bf{font-size:12px;font-weight:600;fill:#20384d}
.bul{font-size:11px;font-weight:400;fill:#20384d}
.spec{font-size:11px;font-weight:400;fill:#3f5160}
</style>
<rect x="0" y="0" width="680" height="556" fill="#f4efe3"/>
<rect x="36" y="36" width="608" height="484" rx="18" fill="#ffffff" stroke="#20384d" stroke-opacity="0.10" stroke-width="1"/>
<image x="520" y="50" width="88" height="62" href="data:image/png;base64,"/>
<text class="h4" x="72" y="96">Trolling motor or <tspan fill="#c8102e">kicker?</tspan></text>
<text class="s4" x="73" y="121">The right auxiliary setup for Rice Lake and the Kawarthas</text>
<line x1="72" y1="141" x2="608" y2="141" stroke="#20384d" stroke-opacity="0.12" stroke-width="1"/>
<rect x="72" y="158" width="256" height="276" rx="12" fill="#f5f6f7" stroke="#20384d" stroke-opacity="0.13" stroke-width="1"/>
<rect x="352" y="158" width="256" height="276" rx="12" fill="#f5f6f7" stroke="#20384d" stroke-opacity="0.13" stroke-width="1"/>
<path d="M72,170 a12,12 0 0 1 12,-12 h232 a12,12 0 0 1 12,12 v42 h-256 z" fill="#20384d"/>
<path d="M352,170 a12,12 0 0 1 12,-12 h232 a12,12 0 0 1 12,12 v42 h-256 z" fill="#c8102e"/>
<text class="hp" x="200.0" y="188" text-anchor="middle">Trolling motor</text>
<text class="phh" x="200.0" y="204" text-anchor="middle">Electric, silent, GPS-precise</text>
<text class="spec" x="200.0" y="236" text-anchor="middle">About 3 to 5 mph  -  1 to 6 hr battery</text>
<line x1="92" y1="250" x2="308" y2="250" stroke="#20384d" stroke-opacity="0.12" stroke-width="1"/>
<text class="bf" x="92" y="272">Best for</text>
<circle cx="96" cy="290" r="2.6" fill="#20384d"/>
<text class="bul" x="106" y="294">Shallow water, bass and panfish</text>
<circle cx="96" cy="316" r="2.6" fill="#20384d"/>
<text class="bul" x="106" y="320">Spot-lock GPS anchoring</text>
<circle cx="96" cy="342" r="2.6" fill="#20384d"/>
<text class="bul" x="106" y="346">Stealth and hands-free solo fishing</text>
<circle cx="96" cy="368" r="2.6" fill="#20384d"/>
<text class="bul" x="106" y="372">Holding a precise spot on structure</text>
<text class="hp" x="480.0" y="188" text-anchor="middle">Gas kicker</text>
<text class="phh" x="480.0" y="204" text-anchor="middle">Range and real thrust</text>
<text class="spec" x="480.0" y="236" text-anchor="middle">About 5 to 7 mph  -  unlimited range</text>
<line x1="372" y1="250" x2="588" y2="250" stroke="#20384d" stroke-opacity="0.12" stroke-width="1"/>
<text class="bf" x="372" y="272">Best for</text>
<circle cx="376" cy="290" r="2.6" fill="#c8102e"/>
<text class="bul" x="386" y="294">Walleye trolling, all-day range</text>
<circle cx="376" cy="316" r="2.6" fill="#c8102e"/>
<text class="bul" x="386" y="320">Big water and building chop</text>
<circle cx="376" cy="342" r="2.6" fill="#c8102e"/>
<text class="bul" x="386" y="346">A backup if the main motor quits</text>
<circle cx="376" cy="368" r="2.6" fill="#c8102e"/>
<text class="bul" x="386" y="372">Sparing a big V6 or V8 main motor</text>
<line x1="72" y1="438" x2="608" y2="438" stroke="#20384d" stroke-opacity="0.12" stroke-width="1"/>
<text class="pun" x="340" y="460" text-anchor="middle">Most serious anglers end up running <tspan fill="#c8102e">both</tspan>.</text>
<text class="subl" x="340" y="482" text-anchor="middle">The electric finds the fish. The kicker covers the water. They solve different problems.</text>
<text class="src4" x="72" y="506">Auxiliary-motor comparison, mercuryrepower.ca. HBW rigs either setup.</text>
</svg>