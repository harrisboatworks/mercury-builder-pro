<svg width="100%" viewBox="0 0 680 632" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Pontoon HP sizing reference table for Mercury outboards</title>
<desc>A reference table for sizing a Mercury outboard to a pontoon by length and use, from 25 to 40 HP on a 16 to 18 ft cruise pontoon up to 250 to 300 HP on a 24 to 26 ft tritoon. Command Thrust matters once you pass 20 ft. Source mercuryrepower.ca.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.h4{font-size:31px;font-weight:700;fill:#20384d}
.s4{font-size:12.5px;font-weight:400;fill:#6f7c88}
.th{font-size:11.5px;font-weight:700;fill:#ffffff}
.rb{font-size:13px;font-weight:700;fill:#20384d}
.rs{font-size:11px;font-weight:400;fill:#6f7c88}
.hp{font-size:14.5px;font-weight:700;fill:#c8102e}
.ct{font-size:11.5px;font-weight:600;fill:#3f5160}
.pun{font-size:14px;font-weight:500;fill:#20384d}
.src4{font-size:11px;font-weight:400;fill:#9aa4ad}
</style>
<rect x="0" y="0" width="680" height="632" fill="#f4efe3"/>
<rect x="36" y="36" width="608" height="560" rx="18" fill="#ffffff" stroke="#20384d" stroke-opacity="0.10" stroke-width="1"/>
<image x="520" y="50" width="88" height="62" href="data:image/png;base64,"/>
<text class="h4" x="72" y="96">Sizing a pontoon <tspan fill="#c8102e">motor</tspan></text>
<text class="s4" x="73" y="121">The Mercury HP your Ontario pontoon actually needs</text>
<line x1="72" y1="141" x2="608" y2="141" stroke="#20384d" stroke-opacity="0.12" stroke-width="1"/>
<defs><clipPath id="tbl"><rect x="72" y="160" width="536" height="338" rx="12"/></clipPath></defs>
<g clip-path="url(#tbl)">
<rect x="72" y="160" width="536" height="38" fill="#20384d"/>
<rect x="72" y="198" width="536" height="50" fill="#ffffff"/>
<rect x="72" y="248" width="536" height="50" fill="#f1f2f3"/>
<rect x="72" y="298" width="536" height="50" fill="#ffffff"/>
<rect x="72" y="348" width="536" height="50" fill="#f1f2f3"/>
<rect x="72" y="398" width="536" height="50" fill="#ffffff"/>
<rect x="72" y="448" width="536" height="50" fill="#f1f2f3"/>
</g>
<rect x="72" y="160" width="536" height="338" rx="12" fill="none" stroke="#20384d" stroke-opacity="0.13" stroke-width="1"/>
<text class="th" x="88" y="183.0">Pontoon length and use</text>
<text class="th" x="377" y="183.0" text-anchor="middle">Recommended HP</text>
<text class="th" x="537" y="183.0" text-anchor="middle">Command Thrust</text>
<line x1="287" y1="198" x2="287" y2="498" stroke="#20384d" stroke-opacity="0.10" stroke-width="1"/>
<line x1="467" y1="198" x2="467" y2="498" stroke="#20384d" stroke-opacity="0.10" stroke-width="1"/>
<text class="rb" x="88" y="220.0">16 to 18 ft</text>
<text class="rs" x="88" y="236.0">2 tubes, calm water cruise</text>
<text class="hp" x="377" y="228.0" text-anchor="middle">25 to 40 HP</text>
<text class="ct" x="537" y="227.0" text-anchor="middle">Not needed</text>
<line x1="72" y1="248" x2="608" y2="248" stroke="#20384d" stroke-opacity="0.09" stroke-width="1"/>
<text class="rb" x="88" y="270.0">18 to 20 ft</text>
<text class="rs" x="88" y="286.0">2 tubes, cruise and fishing</text>
<text class="hp" x="377" y="278.0" text-anchor="middle">40 to 60 HP</text>
<text class="ct" x="537" y="277.0" text-anchor="middle">Not needed</text>
<line x1="72" y1="298" x2="608" y2="298" stroke="#20384d" stroke-opacity="0.09" stroke-width="1"/>
<text class="rb" x="88" y="320.0">20 to 22 ft</text>
<text class="rs" x="88" y="336.0">2 tubes, family plus tube pulling</text>
<text class="hp" x="377" y="328.0" text-anchor="middle">90 to 115 HP</text>
<text class="ct" x="537" y="327.0" text-anchor="middle">Recommended</text>
<line x1="72" y1="348" x2="608" y2="348" stroke="#20384d" stroke-opacity="0.09" stroke-width="1"/>
<text class="rb" x="88" y="370.0">22 to 24 ft</text>
<text class="rs" x="88" y="386.0">2 tubes, all-around family</text>
<text class="hp" x="377" y="378.0" text-anchor="middle">115 to 150 HP</text>
<text class="ct" x="537" y="377.0" text-anchor="middle">Recommended</text>
<line x1="72" y1="398" x2="608" y2="398" stroke="#20384d" stroke-opacity="0.09" stroke-width="1"/>
<text class="rb" x="88" y="420.0">22 to 24 ft</text>
<text class="rs" x="88" y="436.0">Tritoon, watersports capable</text>
<text class="hp" x="377" y="428.0" text-anchor="middle">200 to 250 HP</text>
<text class="ct" x="537" y="427.0" text-anchor="middle">Standard</text>
<line x1="72" y1="448" x2="608" y2="448" stroke="#20384d" stroke-opacity="0.09" stroke-width="1"/>
<text class="rb" x="88" y="470.0">24 to 26 ft</text>
<text class="rs" x="88" y="486.0">Tritoon, watersports and cruise</text>
<text class="hp" x="377" y="478.0" text-anchor="middle">250 to 300 HP</text>
<text class="ct" x="537" y="477.0" text-anchor="middle">Standard</text>
<text class="pun" x="340" y="542" text-anchor="middle">Most pontoons on Ontario lakes are <tspan fill="#c8102e">underpowered</tspan>. Size up, not down.</text>
<text class="src4" x="72" y="576">HP sizing framework, mercuryrepower.ca. Command Thrust matters once you pass 20 ft.</text>
</svg>
