<svg width="100%" viewBox="0 0 680 613" xmlns="http://www.w3.org/2000/svg" role="img">
<title>How to choose the right horsepower for your boat</title>
<desc>Mercury horsepower recommendations by boat type for Kawartha freshwater: aluminum fishing 12 to 16 ft from 9.9 to 60 HP, console boats 16 to 18 ft at 90 to 115 HP, pontoons 18 to 24 ft at 90 to 150 HP Command Thrust, runabouts 18 to 22 ft at 150 to 200 HP. Underpowering is the more expensive mistake. Source mercuryrepower.ca, May 2026.</desc>
<defs><clipPath id="htc"><rect x="72" y="165" width="536" height="310" rx="10"/></clipPath></defs>
<style>
text{font-family:'Anthropic Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.h4{font-size:31px;font-weight:700;fill:#20384d}
.s4{font-size:12.5px;font-weight:400;fill:#6f7c88}
.thd{font-size:11.5px;font-weight:600;fill:#ffffff}
.tb{font-size:11.5px;font-weight:600;fill:#20384d}
.tu{font-size:11px;font-weight:400;fill:#3f5160}
.hp{font-size:12.5px;font-weight:700;fill:#c8102e}
.pun{font-size:14px;font-weight:500;fill:#20384d}
.subl{font-size:12px;font-weight:400;fill:#3f5160}
.src4{font-size:11px;font-weight:400;fill:#9aa4ad}
</style>
<rect x="0" y="0" width="680" height="613" fill="#f4efe3"/>
<rect x="36" y="36" width="608" height="541" rx="18" fill="#ffffff" stroke="#20384d" stroke-opacity="0.10" stroke-width="1"/>
