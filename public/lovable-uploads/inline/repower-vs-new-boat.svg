<svg width="100%" viewBox="0 0 680 498" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Repower versus buying a new boat</title>
<desc>A 115 Pro XS repower costs $21,831.60 against an estimated $65,000 for a comparable new boat, a difference of about $43,168. Source: HBW quote HBW-524137, May 2026.</desc>
<defs><clipPath id="bc3"><rect x="72" y="256" width="528" height="46" rx="6"/></clipPath></defs>
<style>
text{font-family:'Anthropic Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.h3{font-size:31px;font-weight:700;fill:#20384d}
.sub3{font-size:12.5px;font-weight:400;fill:#6f7c88}
.lblA{font-size:13px;font-weight:600;fill:#20384d}
.barv{font-size:16px;font-weight:700;fill:#ffffff}
.bars{font-size:11px;font-weight:400;fill:#ffffff}
.hero{font-size:35px;font-weight:700;fill:#c8102e}
.cap{font-size:13px;font-weight:400;fill:#20384d}
.punch3{font-size:13.5px;font-weight:500;fill:#20384d}
.src3{font-size:11px;font-weight:400;fill:#9aa4ad}
</style>
<rect x="0" y="0" width="680" height="498" fill="#f4efe3"/>
<rect x="36" y="36" width="608" height="426" rx="18" fill="#ffffff" stroke="#20384d" stroke-opacity="0.10" stroke-width="1"/>
<image x="520" y="50" width="88" height="62" href="data:image/png;base64,"/>
<text class="h3" x="72" y="95">Repower, or buy <tspan fill="#c8102e">new?</tspan></text>
<text class="sub3" x="73" y="120">A 115 Pro XS repower against a comparable new boat</text>
<line x1="72" y1="140" x2="608" y2="140" stroke="#20384d" stroke-opacity="0.12" stroke-width="1"/>
<text class="lblA" x="72" y="163">Repower this boat</text>
<rect x="72" y="172" width="177" height="46" rx="6" fill="#20384d"/>
<text class="barv" x="237" y="201" text-anchor="end">$21,831.60</text>
<text class="lblA" x="72" y="247">Buy a comparable new boat</text>
<g clip-path="url(#bc3)">
<rect x="72" y="256" width="177" height="46" fill="#20384d"/>
<rect x="249" y="256" width="351" height="46" fill="#c8102e"/>
</g>
<text class="bars" x="160" y="284" text-anchor="middle">a repower's cost</text>
<text class="bars" x="262" y="284">new-boat premium</text>
<text class="barv" x="588" y="285" text-anchor="end">$65,000</text>
<line x1="72" y1="332" x2="608" y2="332" stroke="#20384d" stroke-opacity="0.12" stroke-width="1"/>
<text class="hero" x="72" y="381">$43,168</text>
<text class="cap" x="232" y="370">The difference. A repower runs about</text>
<text class="cap" x="232" y="388">a third the price of a comparable new boat.</text>
<text class="punch3" x="72" y="424">New power on the boat you already know. Same lake, same dock.</text>
<text class="src3" x="72" y="446">Repower: HBW quote HBW-524137 (115 Pro XS). New-boat figure is a comparable-rig estimate.</text>
</svg>