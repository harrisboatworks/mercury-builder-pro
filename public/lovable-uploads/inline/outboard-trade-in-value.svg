.src4{font-size:11px;font-weight:400;fill:#9aa4ad}
.th{font-size:11.5px;font-weight:700;fill:#ffffff}
.rb{font-size:12.5px;font-weight:700;fill:#20384d}
.val{font-size:11.5px;font-weight:600;fill:#20384d}
</style>
