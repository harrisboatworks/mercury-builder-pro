<svg width="100%" viewBox="0 0 680 612" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Outboard trade-in value by HP class, Ontario 2026</title>
<desc>2026 Ontario trade-in value ranges in CAD for working, documented Mercury and Yamaha four-stroke outboards, by HP class and age. There is no blue book; condition and resale ease set the number. Trading also reduces 13 percent HST on the new motor. Source mercuryrepower.ca, May 2026.</desc>
