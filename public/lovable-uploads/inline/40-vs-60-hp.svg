<svg width="100%" viewBox="0 0 680 534" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Mercury 40 HP versus 60 HP outboard comparison</title>
<desc>Comparison of the Mercury 40 ELPT FourStroke (dealer price $9,532, 3-cylinder, for 14 to 16 ft aluminum boats and 2 to 3 people) and the 60 ELPT FourStroke (dealer price $12,161, 4-cylinder, for 16 to 18 ft boats and heavier loads). The 60 costs about $2,600 more. Source mercuryrepower.ca, May 2026.</desc>
<defs><clipPath id="pc"><rect x="72" y="158" width="256" height="250" rx="12"/><rect x="352" y="158" width="256" height="250" rx="12"/></clipPath></defs>
<style>
text{font-family:'Anthropic Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.h4{font-size:31px;font-weight:700;fill:#20384d}
.s4{font-size:12.5px;font-weight:400;fill:#6f7c88}
.hp{font-size:25px;font-weight:700;fill:#ffffff}
.ph{font-size:11px;font-weight:400;fill:#ffffff}
.pr{font-size:22px;font-weight:700;fill:#20384d}
.prl{font-size:10px;font-weight:400;fill:#8a94a0}
.spec{font-size:11px;font-weight:400;fill:#3f5160}
.bf{font-size:12px;font-weight:600;fill:#20384d}
.bul{font-size:11.5px;font-weight:400;fill:#20384d}
.pun{font-size:14px;font-weight:500;fill:#20384d}
.subl{font-size:12px;font-weight:400;fill:#3f5160}
.src4{font-size:11px;font-weight:400;fill:#9aa4ad}
</style>
<rect x="0" y="0" width="680" height="534" fill="#f4efe3"/>
<rect x="36" y="36" width="608" height="462" rx="18" fill="#ffffff" stroke="#20384d" stroke-opacity="0.10" stroke-width="1"/>
<image x="520" y="50" width="88" height="62" href="data:image/png;base64,"/>
<text class="h4" x="72" y="96">Mercury 40 or <tspan fill="#c8102e">60?</tspan></text>
<text class="s4" x="73" y="121">Which outboard your Ontario boat actually needs</text>
<line x1="72" y1="141" x2="608" y2="141" stroke="#20384d" stroke-opacity="0.12" stroke-width="1"/>
<rect x="72" y="158" width="256" height="250" rx="12" fill="#f5f6f7" stroke="#20384d" stroke-opacity="0.13" stroke-width="1"/>
<rect x="352" y="158" width="256" height="250" rx="12" fill="#f5f6f7" stroke="#20384d" stroke-opacity="0.13" stroke-width="1"/>
<g clip-path="url(#pc)">
<rect x="72" y="158" width="256" height="54" fill="#20384d"/>
<rect x="352" y="158" width="256" height="54" fill="#c8102e"/>
</g>
<text class="hp" x="200" y="191" text-anchor="middle">40 HP</text>
<text class="ph" x="200" y="206" text-anchor="middle">3-cylinder, 747 cc</text>
<text class="hp" x="480" y="191" text-anchor="middle">60 HP</text>
<text class="ph" x="480" y="206" text-anchor="middle">4-cylinder, 995 cc</text>
<text class="pr" x="200" y="247" text-anchor="middle">$9,532</text>
<text class="prl" x="200" y="263" text-anchor="middle">motor, dealer price (CAD)</text>
<text class="pr" x="480" y="247" text-anchor="middle">$12,161</text>
<text class="prl" x="480" y="263" text-anchor="middle">motor, dealer price (CAD)</text>
<line x1="92" y1="278" x2="308" y2="278" stroke="#20384d" stroke-opacity="0.12" stroke-width="1"/>
<line x1="372" y1="278" x2="588" y2="278" stroke="#20384d" stroke-opacity="0.12" stroke-width="1"/>
<text class="spec" x="200" y="298" text-anchor="middle">About 227 lb  ·  18 amp alternator</text>
<text class="spec" x="480" y="298" text-anchor="middle">About 250 lb  ·  25 amp alternator</text>
<text class="bf" x="92" y="325">Best for</text>
<text class="bf" x="372" y="325">Best for</text>
<circle cx="96" cy="343" r="2.6" fill="#20384d"/>
<text class="bul" x="106" y="347">14 to 16 ft aluminum boats</text>
<circle cx="96" cy="365" r="2.6" fill="#20384d"/>
<text class="bul" x="106" y="369">2 to 3 people, fishing, calm water</text>
<circle cx="96" cy="387" r="2.6" fill="#20384d"/>
<text class="bul" x="106" y="391">Capacity plate caps you at 40 HP</text>
<circle cx="376" cy="343" r="2.6" fill="#c8102e"/>
<text class="bul" x="386" y="347">16 to 18 ft aluminum or fibreglass</text>
<circle cx="376" cy="365" r="2.6" fill="#c8102e"/>
<text class="bul" x="386" y="369">3 to 4 people, gear, towing a tube</text>
<circle cx="376" cy="387" r="2.6" fill="#c8102e"/>
<text class="bul" x="386" y="391">Bigger water: Trent-Severn, Simcoe</text>
<text class="pun" x="340" y="442" text-anchor="middle">The real question isn't horsepower. It's <tspan fill="#c8102e">load</tspan>.</text>
<text class="subl" x="340" y="463" text-anchor="middle">About $2,600 more for the 60. Buy power for August, not the test run.</text>
<text class="src4" x="72" y="486">Bare motor dealer prices, mercuryrepower.ca, May 2026. Your capacity plate is the ceiling.</text>
