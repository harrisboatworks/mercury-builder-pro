<svg width="100%" viewBox="0 0 680 578" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Repower or buy a new boat decision comparison</title>
<desc>When to repower: hull stringers, transom and floor are solid, the motor is the only major problem, the layout still fits and you plan to keep the boat five or more years. When to buy new: the transom is soft or water damaged, stringers are rotting or the floor is spongy, the boat is undersized for current family use, or hull repair cost passes the 50 percent rule. Source mercuryrepower.ca.</desc>
<defs><clipPath id="pc"><rect x="72" y="158" width="256" height="276" rx="12"/><rect x="352" y="158" width="256" height="276" rx="12"/></clipPath></defs>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.h4{font-size:31px;font-weight:700;fill:#20384d}
.s4{font-size:12.5px;font-weight:400;fill:#6f7c88}
.hp{font-size:22px;font-weight:700;fill:#ffffff}
.ph{font-size:11px;font-weight:400;fill:#ffffff}
.bf{font-size:12px;font-weight:600;fill:#20384d}
.bul{font-size:11.5px;font-weight:400;fill:#20384d}
.pun{font-size:14px;font-weight:500;fill:#20384d}
.subl{font-size:12px;font-weight:400;fill:#3f5160}
.src4{font-size:11px;font-weight:400;fill:#9aa4ad}
</style>
<rect x="0" y="0" width="680" height="578" fill="#f4efe3"/>
<rect x="36" y="36" width="608" height="506" rx="18" fill="#ffffff" stroke="#20384d" stroke-opacity="0.10" stroke-width="1"/>
<image x="520" y="50" width="88" height="62" href="data:image/png;base64,"/>
<text class="h4" x="72" y="96">Repower, or <tspan fill="#c8102e">buy new?</tspan></text>
<text class="s4" x="73" y="121">The motor is rarely the most expensive thing on your boat</text>
<line x1="72" y1="141" x2="608" y2="141" stroke="#20384d" stroke-opacity="0.12" stroke-width="1"/>
<rect x="72" y="158" width="256" height="276" rx="12" fill="#f5f6f7" stroke="#20384d" stroke-opacity="0.13" stroke-width="1"/>
<rect x="352" y="158" width="256" height="276" rx="12" fill="#f5f6f7" stroke="#20384d" stroke-opacity="0.13" stroke-width="1"/>
<g clip-path="url(#pc)">
<rect x="72" y="158" width="256" height="54" fill="#20384d"/>
<rect x="352" y="158" width="256" height="54" fill="#c8102e"/>
</g>
<text class="hp" x="200" y="188" text-anchor="middle">Repower</text>
<text class="ph" x="200" y="204" text-anchor="middle">Keep the hull, replace the motor</text>
<text class="hp" x="480" y="188" text-anchor="middle">Buy new</text>
<text class="ph" x="480" y="204" text-anchor="middle">Start over with a new hull</text>
<text class="bf" x="92" y="236">The right call when</text>
<text class="bf" x="372" y="236">The right call when</text>
<circle cx="96" cy="252" r="2.6" fill="#20384d"/>
<text class="bul" x="106" y="256">Stringers, transom and floor are</text>
<text class="bul" x="106" y="272">solid, with no soft spots or rot</text>
<circle cx="96" cy="296" r="2.6" fill="#20384d"/>
<text class="bul" x="106" y="300">The motor is the only major problem</text>
<circle cx="96" cy="324" r="2.6" fill="#20384d"/>
<text class="bul" x="106" y="328">Hull layout and seating still fit</text>
<text class="bul" x="106" y="344">how you boat, and you like it</text>
<circle cx="96" cy="368" r="2.6" fill="#20384d"/>
<text class="bul" x="106" y="372">You plan to keep the boat five</text>
<text class="bul" x="106" y="388">or more years</text>
<circle cx="376" cy="252" r="2.6" fill="#c8102e"/>
<text class="bul" x="386" y="256">Transom is soft, cracked or shows</text>
<text class="bul" x="386" y="272">obvious water damage</text>
<circle cx="376" cy="296" r="2.6" fill="#c8102e"/>
<text class="bul" x="386" y="300">Stringers are rotting or the floor</text>
<text class="bul" x="386" y="316">is spongy</text>
<circle cx="376" cy="340" r="2.6" fill="#c8102e"/>
<text class="bul" x="386" y="344">The boat is undersized for how</text>
<text class="bul" x="386" y="360">your family uses it now</text>
<circle cx="376" cy="384" r="2.6" fill="#c8102e"/>
<text class="bul" x="386" y="388">Hull repair cost passes the 50</text>
<text class="bul" x="386" y="404">percent rule (see below)</text>
<text class="pun" x="340" y="470" text-anchor="middle">The real question is not the motor. It is whether the <tspan fill="#c8102e">hull</tspan> is still good.</text>
<text class="subl" x="340" y="491" text-anchor="middle">If repairing the hull tops 50 percent of a comparable new boat, the math says buy new.</text>
<text class="src4" x="72" y="518">Repower vs replace decision logic, mercuryrepower.ca. Free hull walk-around at HBW.</text>
</svg>
