<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="1080" height="1080" fill="#FAFAF7"/>

  <!-- Header band -->
  <rect x="0" y="0" width="1080" height="100" fill="#0F0F10"/>
  <text x="540" y="48" fill="#FFFFFF" font-size="26" font-weight="700" text-anchor="middle" letter-spacing="2">REPOWER ELIGIBILITY: THE 5 CHECKS</text>
  <text x="540" y="78" fill="#A1A1A6" font-size="15" text-anchor="middle">20 minutes in the driveway. Five checks. Know where your boat stands.</text>

  <!-- Check 1 -->
  <rect x="60" y="125" width="960" height="110" rx="14" fill="#FFFFFF" stroke="#E5E5E0" stroke-width="2"/>
  <circle cx="120" cy="180" r="40" fill="#DA291C"/>
  <text x="120" y="195" fill="#FFFFFF" font-size="36" font-weight="700" text-anchor="middle">1</text>
  <text x="190" y="170" fill="#1A1A1A" font-size="22" font-weight="700">Transom integrity</text>
  <text x="190" y="200" fill="#6A6A6E" font-size="16">Tap test for soundness. Look for cracks at motor-mount bolts</text>
  <text x="190" y="222" fill="#6A6A6E" font-size="16">and gel coat crazing. Solid thunk passes.</text>

  <!-- Check 2 -->
  <rect x="60" y="245" width="960" height="110" rx="14" fill="#FFFFFF" stroke="#E5E5E0" stroke-width="2"/>
  <circle cx="120" cy="300" r="40" fill="#DA291C"/>
  <text x="120" y="315" fill="#FFFFFF" font-size="36" font-weight="700" text-anchor="middle">2</text>
  <text x="190" y="290" fill="#1A1A1A" font-size="22" font-weight="700">Hull and foam condition</text>
  <text x="190" y="320" fill="#6A6A6E" font-size="16">Floor walk for soft spots. Bilge dry. No deck or stringer flex.</text>
  <text x="190" y="342" fill="#6A6A6E" font-size="16">No waterlogging weight added to the hull.</text>

  <!-- Check 3 -->
  <rect x="60" y="365" width="960" height="110" rx="14" fill="#FFFFFF" stroke="#E5E5E0" stroke-width="2"/>
  <circle cx="120" cy="420" r="40" fill="#DA291C"/>
  <text x="120" y="435" fill="#FFFFFF" font-size="36" font-weight="700" text-anchor="middle">3</text>
  <text x="190" y="410" fill="#1A1A1A" font-size="22" font-weight="700">Capacity plate</text>
  <text x="190" y="440" fill="#6A6A6E" font-size="16">Plate present and legible. Maximum HP rating matches a current</text>
  <text x="190" y="462" fill="#6A6A6E" font-size="16">Mercury motor in the right class. Plate is the legal ceiling.</text>

  <!-- Check 4 -->
  <rect x="60" y="485" width="960" height="110" rx="14" fill="#FFFFFF" stroke="#E5E5E0" stroke-width="2"/>
  <circle cx="120" cy="540" r="40" fill="#DA291C"/>
  <text x="120" y="555" fill="#FFFFFF" font-size="36" font-weight="700" text-anchor="middle">4</text>
  <text x="190" y="530" fill="#1A1A1A" font-size="22" font-weight="700">Age and hours ratio</text>
  <text x="190" y="560" fill="#6A6A6E" font-size="16">Indoor storage, freshwater, documented service: extends the</text>
  <text x="190" y="582" fill="#6A6A6E" font-size="16">eligible window well past 20 years. Outdoor + high hours shortens it.</text>

  <!-- Check 5 -->
  <rect x="60" y="605" width="960" height="110" rx="14" fill="#FFFFFF" stroke="#E5E5E0" stroke-width="2"/>
  <circle cx="120" cy="660" r="40" fill="#DA291C"/>
  <text x="120" y="675" fill="#FFFFFF" font-size="36" font-weight="700" text-anchor="middle">5</text>
  <text x="190" y="650" fill="#1A1A1A" font-size="22" font-weight="700">Cost threshold</text>
  <text x="190" y="680" fill="#6A6A6E" font-size="16">All-in repower in CAD versus a comparable new boat package.</text>
  <text x="190" y="702" fill="#6A6A6E" font-size="16">Well under = math works. Approaching new-boat cost = reconsider.</text>

  <!-- Outcome header -->
  <rect x="60" y="745" width="960" height="40" fill="#1A1A1A" rx="6"/>
  <text x="540" y="772" fill="#FFFFFF" font-size="17" font-weight="700" text-anchor="middle" letter-spacing="2">OUTCOME</text>

  <!-- Outcome boxes -->
  <!-- Green: Eligible -->
  <rect x="60" y="795" width="305" height="190" rx="12" fill="#FFFFFF" stroke="#2E7D32" stroke-width="3"/>
  <rect x="60" y="795" width="305" height="40" rx="12" fill="#2E7D32"/>
  <text x="212" y="822" fill="#FFFFFF" font-size="17" font-weight="700" text-anchor="middle">ELIGIBLE</text>
  <text x="212" y="868" fill="#1A1A1A" font-size="15" font-weight="600" text-anchor="middle">All 5 checks pass.</text>
  <text x="212" y="896" fill="#1A1A1A" font-size="14" text-anchor="middle">Build a live CAD quote at</text>
  <text x="212" y="918" fill="#DA291C" font-size="14" font-weight="700" text-anchor="middle">mercuryrepower.ca</text>
  <text x="212" y="952" fill="#1A1A1A" font-size="14" text-anchor="middle">Configurator runs in</text>
  <text x="212" y="972" fill="#1A1A1A" font-size="14" text-anchor="middle">5 minutes.</text>

  <!-- Amber: Review -->
  <rect x="387" y="795" width="306" height="190" rx="12" fill="#FFFFFF" stroke="#F09C2D" stroke-width="3"/>
  <rect x="387" y="795" width="306" height="40" rx="12" fill="#F09C2D"/>
  <text x="540" y="822" fill="#FFFFFF" font-size="17" font-weight="700" text-anchor="middle">REVIEW WITH HBW</text>
  <text x="540" y="868" fill="#1A1A1A" font-size="15" font-weight="600" text-anchor="middle">One or two borderline.</text>
  <text x="540" y="896" fill="#1A1A1A" font-size="14" text-anchor="middle">Book a no-charge eligibility</text>
  <text x="540" y="918" fill="#1A1A1A" font-size="14" text-anchor="middle">walk-through. We assess</text>
  <text x="540" y="940" fill="#1A1A1A" font-size="14" text-anchor="middle">in person before committing.</text>
  <text x="540" y="970" fill="#DA291C" font-size="14" font-weight="700" text-anchor="middle">hbw.wiki/service</text>

  <!-- Red: Disqualified -->
  <rect x="715" y="795" width="305" height="190" rx="12" fill="#FFFFFF" stroke="#DA291C" stroke-width="3"/>
  <rect x="715" y="795" width="305" height="40" rx="12" fill="#DA291C"/>
  <text x="868" y="822" fill="#FFFFFF" font-size="17" font-weight="700" text-anchor="middle">NOT A REPOWER</text>
  <text x="868" y="868" fill="#1A1A1A" font-size="15" font-weight="600" text-anchor="middle">Two or more hard stops.</text>
  <text x="868" y="896" fill="#1A1A1A" font-size="14" text-anchor="middle">Conversation shifts to hull</text>
  <text x="868" y="918" fill="#1A1A1A" font-size="14" text-anchor="middle">repair, professional</text>
  <text x="868" y="940" fill="#1A1A1A" font-size="14" text-anchor="middle">inspection, or new boat.</text>
  <text x="868" y="970" fill="#1A1A1A" font-size="14" text-anchor="middle">Honest call beats a bad fit.</text>

  <!-- Footer band -->
  <rect x="0" y="1010" width="1080" height="70" fill="#0F0F10"/>
  <text x="540" y="1042" fill="#FFFFFF" font-size="15" font-weight="700" text-anchor="middle">HARRIS BOAT WORKS · MERCURY PREMIER DEALER · GORES LANDING, ON</text>
  <text x="540" y="1066" fill="#A1A1A6" font-size="13" text-anchor="middle">Mercury dealer since 1965 · Family marina since 1947 · (905) 342-2153</text>
</svg>
