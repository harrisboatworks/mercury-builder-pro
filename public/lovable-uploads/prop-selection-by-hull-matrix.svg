<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="1600" height="900" fill="#FAFAF7"/>

  <!-- Header band -->
  <rect x="0" y="0" width="1600" height="100" fill="#0F0F10"/>
  <text x="60" y="48" fill="#FFFFFF" font-size="30" font-weight="700">MERCURY PROP BY HULL TYPE</text>
  <text x="60" y="78" fill="#A1A1A6" font-size="16">Starting points by hull. Confirm with the wide-open-throttle RPM test.</text>
  <text x="1540" y="62" fill="#DA291C" font-size="18" font-weight="700" text-anchor="end">HBW · 2026</text>

  <!-- Table header row -->
  <rect x="40" y="120" width="1520" height="55" fill="#1A1A1A"/>
  <text x="80" y="155" fill="#FFFFFF" font-size="16" font-weight="700" letter-spacing="1">HULL TYPE</text>
  <text x="540" y="155" fill="#FFFFFF" font-size="16" font-weight="700" letter-spacing="1">GEARCASE</text>
  <text x="820" y="155" fill="#FFFFFF" font-size="16" font-weight="700" letter-spacing="1">BLADES &amp; MATERIAL</text>
  <text x="1180" y="155" fill="#FFFFFF" font-size="16" font-weight="700" letter-spacing="1">MERCURY PROP FAMILY</text>

  <!-- Row 1: Aluminum tiller fishing -->
  <rect x="40" y="175" width="1520" height="95" fill="#FFFFFF" stroke="#E5E5E0" stroke-width="1"/>
  <text x="80" y="215" fill="#1A1A1A" font-size="18" font-weight="700">Aluminum tiller fishing</text>
  <text x="80" y="240" fill="#6A6A6E" font-size="14">14 to 18 ft</text>
  <text x="540" y="225" fill="#1A1A1A" font-size="16">Standard</text>
  <text x="820" y="215" fill="#1A1A1A" font-size="16" font-weight="600">3-blade · Aluminum</text>
  <text x="820" y="240" fill="#6A6A6E" font-size="13">Field-repairable. Strike-tolerant.</text>
  <text x="1180" y="225" fill="#DA291C" font-size="16" font-weight="700">Black Max</text>

  <!-- Row 2: Aluminum console fishing -->
  <rect x="40" y="270" width="1520" height="95" fill="#F5F5F0" stroke="#E5E5E0" stroke-width="1"/>
  <text x="80" y="310" fill="#1A1A1A" font-size="18" font-weight="700">Aluminum console fishing</text>
  <text x="80" y="335" fill="#6A6A6E" font-size="14">16 to 20 ft</text>
  <text x="540" y="320" fill="#1A1A1A" font-size="16">Standard</text>
  <text x="820" y="310" fill="#1A1A1A" font-size="16" font-weight="600">3-blade · Aluminum or stainless</text>
  <text x="820" y="335" fill="#6A6A6E" font-size="13">Stainless for higher HP / top-end.</text>
  <text x="1180" y="320" fill="#DA291C" font-size="16" font-weight="700">Black Max, Spitfire, Enertia</text>

  <!-- Row 3: Deep-V fibreglass -->
  <rect x="40" y="365" width="1520" height="95" fill="#FFFFFF" stroke="#E5E5E0" stroke-width="1"/>
  <text x="80" y="405" fill="#1A1A1A" font-size="18" font-weight="700">Deep-V fibreglass</text>
  <text x="80" y="430" fill="#6A6A6E" font-size="14">18 to 22 ft</text>
  <text x="540" y="415" fill="#1A1A1A" font-size="16">Standard</text>
  <text x="820" y="405" fill="#1A1A1A" font-size="16" font-weight="600">3-blade · Stainless</text>
  <text x="820" y="430" fill="#6A6A6E" font-size="13">Efficiency at cruise + top-end.</text>
  <text x="1180" y="415" fill="#DA291C" font-size="16" font-weight="700">Enertia, Fury 4</text>

  <!-- Row 4: Pontoon mid -->
  <rect x="40" y="460" width="1520" height="95" fill="#F5F5F0" stroke="#E5E5E0" stroke-width="1"/>
  <text x="80" y="500" fill="#1A1A1A" font-size="18" font-weight="700">Pontoon — 90 to 115 HP</text>
  <text x="80" y="525" fill="#6A6A6E" font-size="14">20 to 24 ft</text>
  <text x="540" y="495" fill="#DA291C" font-size="16" font-weight="700">Command Thrust</text>
  <text x="540" y="518" fill="#6A6A6E" font-size="13">Larger gearcase.</text>
  <text x="820" y="500" fill="#1A1A1A" font-size="16" font-weight="600">4-blade · Aluminum or stainless</text>
  <text x="820" y="525" fill="#6A6A6E" font-size="13">CT gearcase needs 4-blade.</text>
  <text x="1180" y="510" fill="#DA291C" font-size="16" font-weight="700">Spitfire X7, Vensura</text>

  <!-- Row 5: Pontoon large -->
  <rect x="40" y="555" width="1520" height="95" fill="#FFFFFF" stroke="#E5E5E0" stroke-width="1"/>
  <text x="80" y="595" fill="#1A1A1A" font-size="18" font-weight="700">Pontoon — 115 to 200 HP</text>
  <text x="80" y="620" fill="#6A6A6E" font-size="14">22 to 26 ft, tritoon-capable</text>
  <text x="540" y="590" fill="#DA291C" font-size="16" font-weight="700">Command Thrust</text>
  <text x="540" y="613" fill="#6A6A6E" font-size="13">Required at this HP.</text>
  <text x="820" y="595" fill="#1A1A1A" font-size="16" font-weight="600">4-blade · Stainless</text>
  <text x="820" y="620" fill="#6A6A6E" font-size="13">Stainless holds shape under load.</text>
  <text x="1180" y="605" fill="#DA291C" font-size="16" font-weight="700">Vensura, Enertia ECO</text>

  <!-- Row 6: Performance / bass -->
  <rect x="40" y="650" width="1520" height="95" fill="#F5F5F0" stroke="#E5E5E0" stroke-width="1"/>
  <text x="80" y="690" fill="#1A1A1A" font-size="18" font-weight="700">Performance / bass</text>
  <text x="80" y="715" fill="#6A6A6E" font-size="14">Pro XS rigging</text>
  <text x="540" y="685" fill="#1A1A1A" font-size="15">Sport Master /</text>
  <text x="540" y="705" fill="#1A1A1A" font-size="15">Torque Master</text>
  <text x="820" y="690" fill="#1A1A1A" font-size="16" font-weight="600">3- or 4-blade · Stainless</text>
  <text x="820" y="715" fill="#6A6A6E" font-size="13">Hole-shot vs. top-end trade.</text>
  <text x="1180" y="700" fill="#DA291C" font-size="16" font-weight="700">Fury 4, Bravo I FS, Pro Max</text>

  <!-- Row 7: Watersports tow -->
  <rect x="40" y="745" width="1520" height="95" fill="#FFFFFF" stroke="#E5E5E0" stroke-width="1"/>
  <text x="80" y="785" fill="#1A1A1A" font-size="18" font-weight="700">Watersports tow / wake</text>
  <text x="80" y="810" fill="#6A6A6E" font-size="14">Ski, wakeboard, tube</text>
  <text x="540" y="790" fill="#1A1A1A" font-size="16">Standard or CT</text>
  <text x="820" y="785" fill="#1A1A1A" font-size="16" font-weight="600">4-blade · Stainless</text>
  <text x="820" y="810" fill="#6A6A6E" font-size="13">Hole-shot priority for towing.</text>
  <text x="1180" y="800" fill="#DA291C" font-size="16" font-weight="700">Fury 4, Enertia ECO</text>

  <!-- Bottom band -->
  <rect x="0" y="850" width="1600" height="50" fill="#0F0F10"/>
  <text x="60" y="882" fill="#FFFFFF" font-size="14" font-weight="600">Final confirmation: WOT RPM test. Each inch of pitch = 150 to 200 RPM.</text>
  <text x="1540" y="882" fill="#DA291C" font-size="14" font-weight="700" text-anchor="end">mercuryrepower.ca</text>
</svg>
