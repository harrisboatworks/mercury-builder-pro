<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="1080" height="1350" fill="#FAFAF7"/>

  <!-- Header band -->
  <rect x="0" y="0" width="1080" height="120" fill="#0F0F10"/>
  <text x="540" y="55" fill="#FFFFFF" font-size="28" font-weight="700" text-anchor="middle" letter-spacing="2">MERCURY OVERHEAT ALARM</text>
  <text x="540" y="92" fill="#DA291C" font-size="22" font-weight="600" text-anchor="middle" letter-spacing="1">Real heat or sensor fault?</text>

  <!-- Start node -->
  <rect x="340" y="160" width="400" height="80" rx="12" fill="#1A1A1A"/>
  <text x="540" y="195" fill="#FFFFFF" font-size="20" font-weight="600" text-anchor="middle">Alarm is sounding</text>
  <text x="540" y="222" fill="#A1A1A6" font-size="15" text-anchor="middle">Start here. Work top to bottom.</text>

  <!-- Arrow down -->
  <line x1="540" y1="240" x2="540" y2="280" stroke="#1A1A1A" stroke-width="3"/>
  <polygon points="540,290 530,272 550,272" fill="#1A1A1A"/>

  <!-- Decision diamond 1: Tell-tale -->
  <polygon points="540,300 800,440 540,580 280,440" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="3"/>
  <text x="540" y="420" fill="#1A1A1A" font-size="22" font-weight="700" text-anchor="middle">Tell-tale stream</text>
  <text x="540" y="450" fill="#1A1A1A" font-size="22" font-weight="700" text-anchor="middle">flowing strong?</text>

  <!-- YES arrow (left) -->
  <line x1="280" y1="440" x2="180" y2="440" stroke="#2E7D32" stroke-width="3"/>
  <polygon points="170,440 188,430 188,450" fill="#2E7D32"/>
  <text x="225" y="430" fill="#2E7D32" font-size="18" font-weight="700" text-anchor="middle">YES</text>

  <!-- NO arrow (right) -->
  <line x1="800" y1="440" x2="900" y2="440" stroke="#DA291C" stroke-width="3"/>
  <polygon points="910,440 892,430 892,450" fill="#DA291C"/>
  <text x="855" y="430" fill="#DA291C" font-size="18" font-weight="700" text-anchor="middle">NO</text>

  <!-- YES outcome (left): Sensor fault -->
  <rect x="40" y="600" width="280" height="170" rx="12" fill="#FFFFFF" stroke="#2E7D32" stroke-width="3"/>
  <rect x="40" y="600" width="280" height="38" rx="12" fill="#2E7D32"/>
  <text x="180" y="625" fill="#FFFFFF" font-size="17" font-weight="700" text-anchor="middle">LIKELY SENSOR FAULT</text>
  <text x="180" y="666" fill="#1A1A1A" font-size="15" font-weight="600" text-anchor="middle">Motor is not actually hot</text>
  <text x="180" y="694" fill="#1A1A1A" font-size="14" text-anchor="middle">Idle to dealer. Book a</text>
  <text x="180" y="714" fill="#1A1A1A" font-size="14" text-anchor="middle">diagnostic. Note RPM/</text>
  <text x="180" y="734" fill="#1A1A1A" font-size="14" text-anchor="middle">load/duration before</text>
  <text x="180" y="754" fill="#1A1A1A" font-size="14" text-anchor="middle">service.</text>

  <!-- Connect YES diamond to NO diamond (continue NO path down) -->
  <line x1="540" y1="580" x2="540" y2="620" stroke="#1A1A1A" stroke-width="3"/>

  <!-- Decision diamond 2: Guardian mode -->
  <polygon points="540,620 800,760 540,900 380,760" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="3"/>
  <text x="540" y="740" fill="#1A1A1A" font-size="22" font-weight="700" text-anchor="middle">Power reduced?</text>
  <text x="540" y="772" fill="#6A6A6E" font-size="16" text-anchor="middle">(Guardian mode active)</text>

  <!-- YES arrow (right): amber -->
  <line x1="800" y1="760" x2="900" y2="760" stroke="#F09C2D" stroke-width="3"/>
  <polygon points="910,760 892,750 892,770" fill="#F09C2D"/>
  <text x="855" y="750" fill="#F09C2D" font-size="18" font-weight="700" text-anchor="middle">YES</text>

  <!-- NO arrow (down): red -->
  <line x1="540" y1="900" x2="540" y2="960" stroke="#DA291C" stroke-width="3"/>
  <polygon points="540,970 530,952 550,952" fill="#DA291C"/>
  <text x="510" y="935" fill="#DA291C" font-size="18" font-weight="700" text-anchor="end">NO</text>

  <!-- AMBER outcome (right): Guardian mode -->
  <rect x="760" y="800" width="280" height="170" rx="12" fill="#FFFFFF" stroke="#F09C2D" stroke-width="3"/>
  <rect x="760" y="800" width="280" height="38" rx="12" fill="#F09C2D"/>
  <text x="900" y="825" fill="#FFFFFF" font-size="17" font-weight="700" text-anchor="middle">GUARDIAN MODE</text>
  <text x="900" y="866" fill="#1A1A1A" font-size="15" font-weight="600" text-anchor="middle">ECM is protecting the engine</text>
  <text x="900" y="894" fill="#1A1A1A" font-size="14" text-anchor="middle">Do NOT override. Reduce</text>
  <text x="900" y="914" fill="#1A1A1A" font-size="14" text-anchor="middle">load. Idle to shore. Find</text>
  <text x="900" y="934" fill="#1A1A1A" font-size="14" text-anchor="middle">the trigger before running</text>
  <text x="900" y="954" fill="#1A1A1A" font-size="14" text-anchor="middle">hard again.</text>

  <!-- RED outcome (bottom): Real heat -->
  <rect x="340" y="980" width="400" height="200" rx="12" fill="#FFFFFF" stroke="#DA291C" stroke-width="3"/>
  <rect x="340" y="980" width="400" height="42" rx="12" fill="#DA291C"/>
  <text x="540" y="1008" fill="#FFFFFF" font-size="19" font-weight="700" text-anchor="middle">REAL HEAT — SHUT DOWN</text>
  <text x="540" y="1055" fill="#1A1A1A" font-size="16" font-weight="600" text-anchor="middle">Tell-tale stopped or weak. No power</text>
  <text x="540" y="1078" fill="#1A1A1A" font-size="16" font-weight="600" text-anchor="middle">reduction yet. Engine is running hot.</text>
  <text x="540" y="1112" fill="#1A1A1A" font-size="15" text-anchor="middle">Shut motor down before further damage.</text>
  <text x="540" y="1135" fill="#1A1A1A" font-size="15" text-anchor="middle">Check intake for weeds. Tow back if</text>
  <text x="540" y="1158" fill="#1A1A1A" font-size="15" text-anchor="middle">needed. New powerhead costs more.</text>

  <!-- HBW footer -->
  <rect x="0" y="1240" width="1080" height="110" fill="#0F0F10"/>
  <text x="540" y="1280" fill="#FFFFFF" font-size="20" font-weight="700" text-anchor="middle">HARRIS BOAT WORKS</text>
  <text x="540" y="1308" fill="#A1A1A6" font-size="15" text-anchor="middle">Mercury Premier Dealer · Gores Landing, ON</text>
  <text x="540" y="1332" fill="#DA291C" font-size="15" font-weight="600" text-anchor="middle">hbw.wiki/service · (905) 342-2153</text>
</svg>
