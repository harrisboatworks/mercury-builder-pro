<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Mercury outboard oil capacity lookup</title>
  <desc id="desc">An HBW reference graphic showing searchable fields for model, year, crankcase, gearcase and oil filter.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081a2d"/>
      <stop offset="1" stop-color="#142f4c"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d71920"/>
      <stop offset="1" stop-color="#f0473e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity=".28"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1445" cy="105" r="255" fill="#fff" opacity=".035"/>
  <circle cx="1470" cy="825" r="350" fill="#d71920" opacity=".08"/>
  <path d="M0 782 C290 720 520 850 820 785 C1110 720 1330 740 1600 675 V900 H0Z" fill="#020b14" opacity=".34"/>

  <g transform="translate(110 115)">
    <rect x="0" y="0" width="220" height="42" rx="21" fill="url(#red)"/>
    <text x="110" y="28" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" text-anchor="middle" letter-spacing="2">HBW REFERENCE</text>
    <text x="0" y="130" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="800">Mercury Outboard</text>
    <text x="0" y="214" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="800">Oil Capacity Lookup</text>
    <text x="2" y="270" fill="#c8d5e3" font-family="Arial, Helvetica, sans-serif" font-size="30">Match the model, year, serial break and gearcase.</text>
  </g>

  <g transform="translate(110 470)" filter="url(#shadow)">
    <rect width="1380" height="275" rx="28" fill="#fff"/>
    <rect width="1380" height="64" rx="28" fill="#edf1f5"/>
    <rect y="36" width="1380" height="28" fill="#edf1f5"/>

    <g font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#506277" letter-spacing="1">
      <text x="34" y="40">MODEL / HP</text>
      <text x="322" y="40">YEAR + IDENTIFIER</text>
      <text x="725" y="40">CRANKCASE</text>
      <text x="935" y="40">GEARCASE</text>
      <text x="1140" y="40">OIL FILTER</text>
    </g>

    <g font-family="Arial, Helvetica, sans-serif" fill="#0b2138">
      <g transform="translate(0 64)">
        <rect width="1380" height="70" fill="#fff"/>
        <text x="34" y="44" font-size="25" font-weight="800">60 HP</text>
        <text x="322" y="34" font-size="22" font-weight="700">2001+ · 996 cc</text>
        <text x="322" y="57" font-size="16" fill="#66788b">standard gearcase</text>
        <text x="725" y="44" font-size="24" font-weight="800">3.17 qt</text>
        <text x="935" y="44" font-size="24" font-weight="800">11.5 oz</text>
        <text x="1140" y="44" font-size="23" font-family="Courier New, monospace" font-weight="700">8M0162830</text>
      </g>
      <g transform="translate(0 134)">
        <rect width="1380" height="70" fill="#f7f9fb"/>
        <text x="34" y="44" font-size="25" font-weight="800">90 HP</text>
        <text x="322" y="34" font-size="22" font-weight="700">2014+ · 2.1 L</text>
        <text x="322" y="57" font-size="16" fill="#66788b">serial 2B094996 and up</text>
        <text x="725" y="44" font-size="24" font-weight="800">5.5 qt</text>
        <text x="935" y="44" font-size="24" font-weight="800">27.1 oz</text>
        <text x="1140" y="44" font-size="23" font-family="Courier New, monospace" font-weight="700">8M0162830</text>
      </g>
      <g transform="translate(0 204)">
        <rect width="1380" height="71" rx="0 0 28 28" fill="#fff"/>
        <text x="34" y="44" font-size="25" font-weight="800">200-300 HP</text>
        <text x="322" y="34" font-size="22" font-weight="700">2018 · 4.6 L V8</text>
        <text x="322" y="57" font-size="16" fill="#66788b">FourStroke</text>
        <text x="725" y="44" font-size="24" font-weight="800">7 qt</text>
        <text x="935" y="44" font-size="24" font-weight="800">24.4 oz</text>
        <text x="1140" y="44" font-size="23" font-family="Courier New, monospace" font-weight="700">8M0176312</text>
      </g>
    </g>

    <g stroke="#d9e1e8" stroke-width="2">
      <line x1="290" y1="0" x2="290" y2="275"/>
      <line x1="690" y1="0" x2="690" y2="275"/>
      <line x1="900" y1="0" x2="900" y2="275"/>
      <line x1="1105" y1="0" x2="1105" y2="275"/>
    </g>
  </g>

  <g transform="translate(111 795)" font-family="Arial, Helvetica, sans-serif">
    <circle cx="12" cy="12" r="12" fill="#d71920"/>
    <path d="M7 12l4 4 7-9" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="38" y="20" fill="#d8e3ee" font-size="22">Reference capacity. Final level comes from the dipstick and serial-number manual.</text>
  </g>
</svg>
