name: Blog pricing drift check

on:
  pull_request:
    paths:
      - 'src/data/blogArticles.ts'
      - 'src/data/*BlogArticles.ts'
      - 'public/pricing-reference.md'
      - 'scripts/check-blog-pricing-drift.mjs'
      - 'scripts/reconcile-blog-pricing.mjs'
      - 'scripts/lib/canonical-pricing.mjs'
      - 'scripts/generate-canonical-pricing.mjs'
  push:
    branches: [main]
    paths:
      - 'src/data/blogArticles.ts'
      - 'src/data/*BlogArticles.ts'
      - 'public/pricing-reference.md'

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # No npm install needed — scripts use only Node built-ins.
      - name: Regenerate canonical pricing
        run: node scripts/generate-canonical-pricing.mjs
      - name: Check blog pricing drift
        run: node scripts/check-blog-pricing-drift.mjs
