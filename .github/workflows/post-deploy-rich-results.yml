name: Post-Deploy Rich Results Check

# Probes Google Search Console URL Inspection for rich-result verdicts on a
# curated list of canonical pages after every successful Vercel production
# deploy. Non-blocking; surfaces a per-URL verdict in the workflow logs and
# uploads the JSON report as an artifact.
#
# Requires repo secrets:
#   LOVABLE_API_KEY
#   GOOGLE_SEARCH_CONSOLE_API_KEY

on:
  deployment_status:
  workflow_dispatch:

jobs:
  rich-results:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'Production') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run rich-results probe
        env:
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
          GOOGLE_SEARCH_CONSOLE_API_KEY: ${{ secrets.GOOGLE_SEARCH_CONSOLE_API_KEY }}
          RICH_RESULTS_OUT: rich-results-report.json
        run: node scripts/post-deploy-rich-results.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rich-results-report
          path: rich-results-report.json
